# version: "3.8"

services:
  mongo:
    image: mongo
    ports:
    - "27017:27017"
    environment:
     MONGO_INITDB_ROOT_USERNAME: admin123
     MONGO_INITDB_ROOT_PASSWORD: pass123

  mongo-express:
    image: mongo-express
    ports:
    - "8081:8081"
    environment:
     ME_CONFIG_MONGODB_ADMINUSERNAME: admin123
     ME_CONFIG_MONGODB_ADMINPASSWORD: pass123
     ME_CONFIG_MONGODB_URL: mongodb://admin123:pass123@mongo:27017/

  nodeapp:
    image: shreedev29/my-nodeapp:4.0
    ports:
      - "3030:3030"
    depends_on:
      - mongo
     
